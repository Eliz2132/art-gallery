<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="signup-page">
    <div class="stars"></div>
    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="signup-card">
            <div class="signup-header">
                <h1 class="text-center mb-1">Create Account</h1>
                <p class="text-center text-muted">Join Our Art Community</p>
            </div>
            <form class="signup-form" action="gallery-home.html" method="GET">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control input-animated" id="firstName" placeholder="First Name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control input-animated" id="lastName" placeholder="Last Name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="signupEmail" class="form-label">Email Address</label>
                    <input type="email" class="form-control input-animated" id="signupEmail" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label for="signupPassword" class="form-label">Password</label>
                    <input type="password" class="form-control input-animated" id="signupPassword" placeholder="Create a password" required>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control input-animated" id="confirmPassword" placeholder="Confirm password" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">
                        I agree to the Terms and Conditions
                    </label>
                </div>
                <button type="submit" class="btn btn-success w-100 btn-signup">Sign Up</button>
            </form>
            <div class="text-center mt-4">
                <p>Already have an account? <a href="index.html" class="link-primary">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
